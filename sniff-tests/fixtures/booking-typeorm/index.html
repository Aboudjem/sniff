<!doctype html>
<html>
  <head><title>Book a stay</title></head>
  <body>
    <h1>Find a place to stay</h1>
    <form action="/search" method="get">
      <input name="city" type="text" aria-label="City" placeholder="Where to?" />
      <input name="checkIn" type="date" aria-label="Check in" />
      <input name="checkOut" type="date" aria-label="Check out" />
      <button type="submit">Search</button>
    </form>
  </body>
</html>
