<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#22c55e"/></marker>
  </defs>

  <rect width="1100" height="580" rx="16" fill="#fafafa"/>
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">Sniff Architecture</text>

  <!-- CLI Layer -->
  <rect x="30" y="56" width="200" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#s)"/>
  <text x="130" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">CLI</text>
  <text x="130" y="100" text-anchor="middle" font-size="10" fill="#7f1d1d">sniff / npx sniff-qa</text>
  <text x="130" y="116" text-anchor="middle" font-size="9" fill="#9ca3af">commander.js</text>

  <!-- MCP Layer -->
  <rect x="30" y="150" width="200" height="60" rx="10" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="130" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">MCP Server</text>
  <text x="130" y="194" text-anchor="middle" font-size="9" fill="#6b7280">sniff_scan / sniff_run / sniff_report</text>

  <!-- Config -->
  <rect x="30" y="228" width="200" height="50" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1" filter="url(#s)"/>
  <text x="130" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Config Loader</text>
  <text x="130" y="266" text-anchor="middle" font-size="9" fill="#9ca3af">cosmiconfig + zod</text>

  <!-- Source Scanner -->
  <rect x="300" y="56" width="340" height="230" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1" filter="url(#s)"/>
  <text x="470" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Source Scanner</text>

  <rect x="320" y="96" width="140" height="28" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="390" y="114" text-anchor="middle" font-size="10" fill="#991b1b">Debug Rules</text>
  <rect x="480" y="96" width="140" height="28" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="550" y="114" text-anchor="middle" font-size="10" fill="#991b1b">Placeholder Rules</text>
  <rect x="320" y="132" width="140" height="28" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="390" y="150" text-anchor="middle" font-size="10" fill="#991b1b">Hardcoded Rules</text>
  <rect x="480" y="132" width="140" height="28" rx="5" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="550" y="150" text-anchor="middle" font-size="10" fill="#991b1b">Import Rules</text>

  <rect x="320" y="170" width="140" height="28" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="390" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Dead Link Checker</text>
  <rect x="480" y="170" width="140" height="28" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="550" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">API Discovery</text>

  <rect x="320" y="210" width="300" height="28" rx="5" fill="#f0f9ff" stroke="#93c5fd"/>
  <text x="470" y="228" text-anchor="middle" font-size="10" fill="#1e40af">Repo Analyzer (framework + routes + elements)</text>

  <rect x="320" y="248" width="300" height="28" rx="5" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="470" y="266" text-anchor="middle" font-size="10" fill="#5b21b6">AST Parsing (babel + vue-compiler-sfc)</text>

  <!-- Browser Runner -->
  <rect x="300" y="310" width="340" height="220" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1" filter="url(#s)"/>
  <text x="470" y="336" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">Browser Runner</text>
  <text x="470" y="352" text-anchor="middle" font-size="9" fill="#9ca3af">Playwright (Chromium)</text>

  <rect x="320" y="364" width="140" height="28" rx="5" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="390" y="382" text-anchor="middle" font-size="10" fill="#5b21b6">Accessibility (axe)</text>
  <rect x="480" y="364" width="140" height="28" rx="5" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="550" y="382" text-anchor="middle" font-size="10" fill="#92400e">Visual (pixelmatch)</text>

  <rect x="320" y="400" width="140" height="28" rx="5" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="390" y="418" text-anchor="middle" font-size="10" fill="#065f46">Perf (Lighthouse)</text>
  <rect x="480" y="400" width="140" height="28" rx="5" fill="#fff1f2" stroke="#fda4af"/>
  <text x="550" y="418" text-anchor="middle" font-size="10" fill="#9f1239">AI Explorer (Claude)</text>

  <rect x="320" y="442" width="300" height="28" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="470" y="460" text-anchor="middle" font-size="10" fill="#475569">Network + Console + Screenshot capture</text>

  <rect x="320" y="480" width="300" height="28" rx="5" fill="#fefce8" stroke="#fde68a"/>
  <text x="470" y="498" text-anchor="middle" font-size="10" fill="#854d0e">Flakiness Tracker (quarantine system)</text>

  <!-- Cross-Reference Engine -->
  <rect x="710" y="200" width="180" height="100" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#s)"/>
  <text x="800" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Cross-Reference</text>
  <text x="800" y="250" text-anchor="middle" font-size="10" fill="#166534">Correlation Engine</text>
  <text x="800" y="268" text-anchor="middle" font-size="10" fill="#15803d">5 strategies</text>
  <text x="800" y="292" text-anchor="middle" font-size="8" font-weight="600" fill="#15803d">NEW in v0.2</text>

  <!-- Report Engine -->
  <rect x="920" y="120" width="150" height="170" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#s)"/>
  <text x="995" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">Report Engine</text>
  <rect x="935" y="164" width="120" height="22" rx="4" fill="#334155"/>
  <text x="995" y="179" text-anchor="middle" font-size="9" fill="#94a3b8">HTML Report</text>
  <rect x="935" y="192" width="120" height="22" rx="4" fill="#334155"/>
  <text x="995" y="207" text-anchor="middle" font-size="9" fill="#94a3b8">JSON Export</text>
  <rect x="935" y="220" width="120" height="22" rx="4" fill="#334155"/>
  <text x="995" y="235" text-anchor="middle" font-size="9" fill="#94a3b8">JUnit XML (CI)</text>
  <rect x="935" y="248" width="120" height="22" rx="4" fill="#334155"/>
  <text x="995" y="263" text-anchor="middle" font-size="9" fill="#fbbf24">CLI Formatter</text>

  <!-- Arrows -->
  <line x1="230" y1="96" x2="300" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="230" y1="170" x2="300" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="640" y1="170" x2="710" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="640" y1="420" x2="710" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="890" y1="250" x2="920" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="640" y1="130" x2="920" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <line x1="640" y1="450" x2="920" y2="260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>

  <!-- Labels -->
  <text x="660" y="160" font-size="8" fill="#9ca3af">source findings</text>
  <text x="660" y="310" font-size="8" fill="#9ca3af">browser findings</text>
  <text x="860" y="210" font-size="8" fill="#22c55e">corroborated</text>
</svg>
