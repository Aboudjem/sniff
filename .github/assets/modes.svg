<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <filter id="rough3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
    <linearGradient id="modeA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="modeB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="modeC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="28" font-weight="800" fill="#0f172a">three modes. that's it.</text>

  <!-- ────────── Mode 1: Quick (Yellow) ────────── -->
  <g filter="url(#rough3)">
    <rect x="40" y="90" width="370" height="400" rx="20" fill="url(#modeA)" stroke="#92400e" stroke-width="3"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="110" width="74" height="26" rx="4" fill="#92400e"/>
  <text x="97" y="129" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="1.5">QUICK</text>

  <!-- Title -->
  <text x="60" y="178" font-size="26" font-weight="800" fill="#0f172a">source scan</text>
  <text x="60" y="202" font-size="14" font-weight="600" fill="#78350f" font-style="italic">~2 seconds · no browser needed</text>

  <!-- Terminal -->
  <rect x="60" y="222" width="330" height="48" rx="8" fill="#0f172a"/>
  <text x="78" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="17" font-weight="700" fill="#fbbf24">$</text>
  <text x="98" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="17" font-weight="700" fill="#f1f5f9">npx sniff-qa</text>

  <!-- Checklist -->
  <text x="60" y="312" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="84" y="312" font-size="17" fill="#0f172a" font-weight="600">source code</text>

  <text x="60" y="342" font-size="17" fill="#9ca3af" font-weight="700">✗</text>
  <text x="84" y="342" font-size="17" fill="#9ca3af">accessibility</text>

  <text x="60" y="372" font-size="17" fill="#9ca3af" font-weight="700">✗</text>
  <text x="84" y="372" font-size="17" fill="#9ca3af">visual regression</text>

  <text x="60" y="402" font-size="17" fill="#9ca3af" font-weight="700">✗</text>
  <text x="84" y="402" font-size="17" fill="#9ca3af">performance</text>

  <text x="60" y="432" font-size="17" fill="#9ca3af" font-weight="700">✗</text>
  <text x="84" y="432" font-size="17" fill="#9ca3af">AI explorer</text>

  <!-- ────────── Mode 2: Full (Purple) ────────── -->
  <g filter="url(#rough3)">
    <rect x="430" y="90" width="370" height="400" rx="20" fill="url(#modeB)" stroke="#5b21b6" stroke-width="3"/>
  </g>

  <rect x="450" y="110" width="60" height="26" rx="4" fill="#5b21b6"/>
  <text x="480" y="129" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="1.5">FULL</text>

  <text x="450" y="178" font-size="26" font-weight="800" fill="#0f172a">complete audit</text>
  <text x="450" y="202" font-size="14" font-weight="600" fill="#4c1d95" font-style="italic">~1-3 minutes · runs everything</text>

  <rect x="450" y="222" width="330" height="48" rx="8" fill="#0f172a"/>
  <text x="468" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="17" font-weight="700" fill="#a78bfa">$</text>
  <text x="488" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="15" font-weight="700" fill="#f1f5f9">sniff --url localhost:3000</text>

  <text x="450" y="312" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="474" y="312" font-size="17" fill="#0f172a" font-weight="600">source code</text>

  <text x="450" y="342" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="474" y="342" font-size="17" fill="#0f172a" font-weight="600">accessibility</text>

  <text x="450" y="372" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="474" y="372" font-size="17" fill="#0f172a" font-weight="600">visual regression</text>

  <text x="450" y="402" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="474" y="402" font-size="17" fill="#0f172a" font-weight="600">performance</text>

  <text x="450" y="432" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="474" y="432" font-size="17" fill="#0f172a" font-weight="600">AI explorer</text>

  <!-- ────────── Mode 3: CI (Green) ────────── -->
  <g filter="url(#rough3)">
    <rect x="820" y="90" width="340" height="400" rx="20" fill="url(#modeC)" stroke="#065f46" stroke-width="3"/>
  </g>

  <rect x="840" y="110" width="44" height="26" rx="4" fill="#065f46"/>
  <text x="862" y="129" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="1.5">CI</text>

  <text x="840" y="178" font-size="26" font-weight="800" fill="#0f172a">ci mode</text>
  <text x="840" y="202" font-size="14" font-weight="600" fill="#064e3b" font-style="italic">deterministic · pipelines</text>

  <rect x="840" y="222" width="300" height="48" rx="8" fill="#0f172a"/>
  <text x="858" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="17" font-weight="700" fill="#34d399">$</text>
  <text x="878" y="252" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="14" font-weight="700" fill="#f1f5f9">sniff --url ... --ci</text>

  <text x="840" y="312" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="864" y="312" font-size="17" fill="#0f172a" font-weight="600">source code</text>

  <text x="840" y="342" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="864" y="342" font-size="17" fill="#0f172a" font-weight="600">accessibility</text>

  <text x="840" y="372" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="864" y="372" font-size="17" fill="#0f172a" font-weight="600">visual regression</text>

  <text x="840" y="402" font-size="17" fill="#065f46" font-weight="700">✓</text>
  <text x="864" y="402" font-size="17" fill="#0f172a" font-weight="600">performance</text>

  <text x="840" y="432" font-size="17" fill="#9ca3af" font-weight="700">✗</text>
  <text x="864" y="432" font-size="17" fill="#9ca3af" font-weight="600">AI explorer</text>
  <text x="864" y="452" font-size="12" fill="#6b7280" font-style="italic">(skipped — non-deterministic)</text>
</svg>
