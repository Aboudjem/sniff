<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="rough3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
    <linearGradient id="modeA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="modeB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="modeC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <style>
    .ttl { font-size: 28px; font-weight: 800; fill: #0f172a; }
    .badge { font-size: 12px; font-weight: 800; fill: #fff; letter-spacing: 1px; }
    .mode-name { font-size: 22px; font-weight: 800; fill: #0f172a; }
    .cmd { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; font-weight: 600; fill: #0f172a; }
    .check { font-size: 18px; }
    .row { font-size: 16px; fill: #1e293b; }
    .speed { font-size: 13px; font-weight: 700; fill: #475569; font-style: italic; }
  </style>

  <text x="600" y="42" text-anchor="middle" class="ttl">three modes. that's it.</text>

  <!-- ── Mode 1 ───────────────────────────────────── -->
  <g filter="url(#rough3)">
    <rect x="40" y="90" width="370" height="340" rx="20" fill="url(#modeA)" stroke="#92400e" stroke-width="3"/>
  </g>
  <rect x="60" y="110" width="60" height="22" rx="4" fill="#92400e"/>
  <text x="90" y="126" text-anchor="middle" class="badge">QUICK</text>
  <text x="60" y="172" class="mode-name">source scan</text>
  <text x="60" y="195" class="speed">~2 seconds · no browser</text>

  <rect x="60" y="215" width="330" height="42" rx="8" fill="#0f172a"/>
  <text x="75" y="242" class="cmd" fill="#fbbf24">$ </text>
  <text x="95" y="242" class="cmd" fill="#f1f5f9">npx sniff-qa</text>

  <text x="60" y="295" class="row">📄 source code</text>
  <text x="60" y="322" class="row" fill="#94a3b8">✗ accessibility</text>
  <text x="60" y="349" class="row" fill="#94a3b8">✗ visual regression</text>
  <text x="60" y="376" class="row" fill="#94a3b8">✗ performance</text>
  <text x="60" y="403" class="row" fill="#94a3b8">✗ AI explorer</text>

  <!-- ── Mode 2 ───────────────────────────────────── -->
  <g filter="url(#rough3)">
    <rect x="430" y="90" width="370" height="340" rx="20" fill="url(#modeB)" stroke="#5b21b6" stroke-width="3"/>
  </g>
  <rect x="450" y="110" width="60" height="22" rx="4" fill="#5b21b6"/>
  <text x="480" y="126" text-anchor="middle" class="badge">FULL</text>
  <text x="450" y="172" class="mode-name">complete audit</text>
  <text x="450" y="195" class="speed">~1-3 minutes · everything</text>

  <rect x="450" y="215" width="330" height="42" rx="8" fill="#0f172a"/>
  <text x="465" y="242" class="cmd" fill="#a78bfa">$ </text>
  <text x="485" y="242" class="cmd" fill="#f1f5f9">sniff --url localhost:3000</text>

  <text x="450" y="295" class="row">📄 source code</text>
  <text x="450" y="322" class="row">♿ accessibility</text>
  <text x="450" y="349" class="row">🖼  visual regression</text>
  <text x="450" y="376" class="row">⚡ performance</text>
  <text x="450" y="403" class="row">🤖 AI explorer</text>

  <!-- ── Mode 3 ───────────────────────────────────── -->
  <g filter="url(#rough3)">
    <rect x="820" y="90" width="340" height="340" rx="20" fill="url(#modeC)" stroke="#065f46" stroke-width="3"/>
  </g>
  <rect x="840" y="110" width="44" height="22" rx="4" fill="#065f46"/>
  <text x="862" y="126" text-anchor="middle" class="badge">CI</text>
  <text x="840" y="172" class="mode-name">ci mode</text>
  <text x="840" y="195" class="speed">deterministic · pipelines</text>

  <rect x="840" y="215" width="300" height="42" rx="8" fill="#0f172a"/>
  <text x="855" y="242" class="cmd" fill="#34d399">$ </text>
  <text x="875" y="242" class="cmd" fill="#f1f5f9">sniff --url ... --ci</text>

  <text x="840" y="295" class="row">📄 source code</text>
  <text x="840" y="322" class="row">♿ accessibility</text>
  <text x="840" y="349" class="row">🖼  visual regression</text>
  <text x="840" y="376" class="row">⚡ performance</text>
  <text x="840" y="403" class="row" fill="#94a3b8">✗ AI explorer (skipped)</text>
</svg>
