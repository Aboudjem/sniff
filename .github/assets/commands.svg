<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Caveat', 'Comic Sans MS', system-ui, sans-serif">
  <defs>
    <filter id="rough2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8"/>
    </filter>
    <linearGradient id="cmd1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cmd2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="cmd3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="cmd4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <style>
    .ttl { font-size: 28px; font-weight: 800; fill: #0f172a; }
    .cmd { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 18px; font-weight: 700; fill: #0f172a; }
    .desc { font-size: 18px; fill: #334155; }
    .check { font-size: 22px; }
    .stamp { font-size: 14px; font-weight: 700; }
  </style>

  <text x="600" y="50" text-anchor="middle" class="ttl">what each command runs</text>

  <!-- Card 1: source only -->
  <g filter="url(#rough2)">
    <rect x="60" y="100" width="520" height="240" rx="20" fill="url(#cmd1)" stroke="#92400e" stroke-width="3"/>
  </g>
  <text x="320" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">⚡ FAST · NO BROWSER</text>
  <text x="80" y="190" class="cmd">$ npx sniff-qa</text>
  <text x="80" y="225" class="desc">✓ source code (TODOs, debug, imports)</text>
  <text x="80" y="252" class="desc">✗ accessibility</text>
  <text x="80" y="279" class="desc">✗ visual regression</text>
  <text x="80" y="306" class="desc">✗ performance</text>
  <text x="80" y="333" class="desc">✗ AI explorer</text>

  <!-- Card 2: full audit -->
  <g filter="url(#rough2)">
    <rect x="620" y="100" width="520" height="240" rx="20" fill="url(#cmd2)" stroke="#1e40af" stroke-width="3"/>
  </g>
  <text x="880" y="140" text-anchor="middle" font-size="20" font-weight="700" fill="#1e40af">🌐 FULL AUDIT · BROWSER</text>
  <text x="640" y="190" class="cmd">$ npx sniff-qa --url localhost:3000</text>
  <text x="640" y="225" class="desc">✓ source code</text>
  <text x="640" y="252" class="desc">✓ accessibility</text>
  <text x="640" y="279" class="desc">✓ visual regression</text>
  <text x="640" y="306" class="desc">✓ performance</text>
  <text x="640" y="333" class="desc">✗ AI explorer</text>

  <!-- Card 3: full + explore -->
  <g filter="url(#rough2)">
    <rect x="60" y="380" width="520" height="240" rx="20" fill="url(#cmd3)" stroke="#9d174d" stroke-width="3"/>
  </g>
  <text x="320" y="420" text-anchor="middle" font-size="20" font-weight="700" fill="#9d174d">🔥 EVERYTHING · BROWSER + AI</text>
  <text x="80" y="465" class="cmd">$ sniff --url localhost:3000 --explore</text>
  <text x="80" y="500" class="desc">✓ source code</text>
  <text x="80" y="527" class="desc">✓ accessibility</text>
  <text x="80" y="554" class="desc">✓ visual regression</text>
  <text x="80" y="581" class="desc">✓ performance</text>
  <text x="80" y="608" class="desc">✓ AI explorer (chaos monkey)</text>

  <!-- Card 4: CI mode -->
  <g filter="url(#rough2)">
    <rect x="620" y="380" width="520" height="240" rx="20" fill="url(#cmd4)" stroke="#065f46" stroke-width="3"/>
  </g>
  <text x="880" y="420" text-anchor="middle" font-size="20" font-weight="700" fill="#065f46">🤖 CI MODE</text>
  <text x="640" y="465" class="cmd">$ npx sniff-qa --url ... --ci</text>
  <text x="640" y="500" class="desc">✓ everything from full audit</text>
  <text x="640" y="527" class="desc">✓ headless mode (no GUI)</text>
  <text x="640" y="554" class="desc">✓ JUnit XML output</text>
  <text x="640" y="581" class="desc">✓ flakiness quarantine</text>
  <text x="640" y="608" class="desc">✓ non-zero exit on failure</text>

  <text x="600" y="685" text-anchor="middle" font-size="16" fill="#64748b">add --explore to any command for AI chaos monkey · add --json for machine output</text>
</svg>
