<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes blink { 0%,36%,40%,100% { transform: scaleY(1); } 38% { transform: scaleY(0.05); } }
    @keyframes sniff { 0%,100% { transform: scale(1); } 40% { transform: scale(1.08); } }
    .cat { animation: bob 2.5s ease-in-out infinite; }
    .eyes { animation: blink 4s ease-in-out infinite; transform-origin: 50px 46px; }
    .nose { animation: sniff 1.6s ease-in-out infinite; transform-origin: 50px 56px; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#fff9f3" stroke="#f9a03f" stroke-width="1" stroke-opacity="0.1"/>

  <g class="cat" transform="translate(48, 30)">
    <!-- Tail -->
    <path d="M 68 88 Q 100 58 94 32" stroke="#f9a03f" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="50" cy="94" rx="22" ry="16" fill="#f9a03f"/>
    <ellipse cx="50" cy="97" rx="13" ry="10" fill="#ffecd2"/>

    <!-- Head -->
    <circle cx="50" cy="48" r="34" fill="#f9a03f"/>

    <!-- Inner face -->
    <circle cx="50" cy="52" r="23" fill="#ffecd2"/>

    <!-- Ears -->
    <polygon points="20,30 28,4 40,26" fill="#f9a03f"/>
    <polygon points="60,26 72,4 80,30" fill="#f9a03f"/>
    <polygon points="24,27 30,10 36,26" fill="#ffd6b0"/>
    <polygon points="64,26 70,10 76,27" fill="#ffd6b0"/>

    <!-- Eyes -->
    <g class="eyes">
      <circle cx="38" cy="46" r="8" fill="#2d2118"/>
      <circle cx="62" cy="46" r="8" fill="#2d2118"/>
      <!-- Shine -->
      <circle cx="41" cy="43" r="3.2" fill="white"/>
      <circle cx="65" cy="43" r="3.2" fill="white"/>
      <circle cx="36" cy="48" r="1.5" fill="white" opacity="0.4"/>
      <circle cx="60" cy="48" r="1.5" fill="white" opacity="0.4"/>
    </g>

    <!-- Blush -->
    <ellipse cx="24" cy="55" rx="6" ry="3.5" fill="#ffb88c" opacity="0.45"/>
    <ellipse cx="76" cy="55" rx="6" ry="3.5" fill="#ffb88c" opacity="0.45"/>

    <!-- Nose -->
    <g class="nose">
      <ellipse cx="50" cy="56" rx="3.5" ry="2.8" fill="#e8596e"/>
    </g>

    <!-- Mouth -->
    <path d="M 46 59 Q 48 62 50 59 Q 52 62 54 59" stroke="#c4956e" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="16" y1="52" x2="32" y2="54" stroke="#ddb896" stroke-width="0.7"/>
    <line x1="18" y1="59" x2="33" y2="58" stroke="#ddb896" stroke-width="0.7"/>
    <line x1="68" y1="54" x2="84" y2="52" stroke="#ddb896" stroke-width="0.7"/>
    <line x1="67" y1="58" x2="82" y2="59" stroke="#ddb896" stroke-width="0.7"/>

    <!-- Paws -->
    <ellipse cx="36" cy="108" rx="9" ry="5" fill="#f9a03f"/>
    <ellipse cx="64" cy="108" rx="9" ry="5" fill="#f9a03f"/>
  </g>

  <text x="178" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" fill="#2d2118" letter-spacing="-2">sniff</text>
  <text x="178" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#e8596e" font-weight="600">AI-Powered QA Testing</text>
  <text x="178" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#b8a08a">One command · Eight checks · Zero config</text>
</svg>
