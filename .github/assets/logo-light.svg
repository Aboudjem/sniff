<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes blink { 0%,38%,42%,100% { ry: 10; } 40% { ry: 1; } }
    @keyframes sniff { 0%,100% { transform: scale(1); } 30% { transform: scale(1.12); } 60% { transform: scale(0.92); } }
    .cat { animation: bob 2.8s ease-in-out infinite; }
    .eye-l, .eye-r { animation: blink 4.5s ease-in-out infinite; }
    .eye-r { animation-delay: 0.1s; }
    .nose { animation: sniff 1.4s ease-in-out infinite; transform-origin: 50px 58px; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#fffaf5" stroke="#fb923c" stroke-width="1" stroke-opacity="0.12"/>

  <g class="cat" transform="translate(46, 28)">
    <!-- Tail (simple curve) -->
    <path d="M 70 90 Q 108 50 95 25" stroke="#fb923c" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Body (round blob) -->
    <ellipse cx="50" cy="98" rx="26" ry="20" fill="#fb923c"/>
    <ellipse cx="50" cy="102" rx="15" ry="12" fill="#fff3e0"/>

    <!-- Head (big round, cat proportions) -->
    <circle cx="50" cy="50" r="38" fill="#fb923c"/>

    <!-- Inner face -->
    <ellipse cx="50" cy="55" rx="26" ry="22" fill="#fff3e0"/>

    <!-- Ears (pointed, cat-like) -->
    <polygon points="18,32 26,2 40,26" fill="#fb923c"/>
    <polygon points="60,26 74,2 82,32" fill="#fb923c"/>
    <polygon points="22,29 28,8 36,26" fill="#ffe4c9"/>
    <polygon points="64,26 72,8 78,29" fill="#ffe4c9"/>

    <!-- Eyes (big, round, cute) -->
    <ellipse cx="36" cy="48" rx="10" ry="10" fill="#1c1917"/>
    <ellipse class="eye-l" cx="36" cy="48" rx="10" ry="10" fill="#1c1917"/>
    <ellipse class="eye-r" cx="64" cy="48" rx="10" ry="10" fill="#1c1917"/>
    <!-- Shine (big top, small bottom) -->
    <circle cx="40" cy="44" r="4" fill="white"/>
    <circle cx="68" cy="44" r="4" fill="white"/>
    <circle cx="34" cy="51" r="1.8" fill="white" opacity="0.5"/>
    <circle cx="62" cy="51" r="1.8" fill="white" opacity="0.5"/>

    <!-- Blush -->
    <ellipse cx="22" cy="58" rx="7" ry="4" fill="#fdba74" opacity="0.5"/>
    <ellipse cx="78" cy="58" rx="7" ry="4" fill="#fdba74" opacity="0.5"/>

    <!-- Nose -->
    <g class="nose">
      <ellipse cx="50" cy="58" rx="4.5" ry="3.5" fill="#f43f5e"/>
    </g>

    <!-- Mouth (simple cat :3) -->
    <path d="M 45 62 Q 47.5 66 50 62" stroke="#d4a373" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 50 62 Q 52.5 66 55 62" stroke="#d4a373" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Whiskers (thin, minimal) -->
    <line x1="10" y1="55" x2="30" y2="57" stroke="#e5c9a8" stroke-width="0.8"/>
    <line x1="12" y1="63" x2="30" y2="62" stroke="#e5c9a8" stroke-width="0.8"/>
    <line x1="70" y1="57" x2="90" y2="55" stroke="#e5c9a8" stroke-width="0.8"/>
    <line x1="70" y1="62" x2="88" y2="63" stroke="#e5c9a8" stroke-width="0.8"/>

    <!-- Paws (little ovals) -->
    <ellipse cx="34" cy="116" rx="10" ry="6" fill="#fb923c"/>
    <ellipse cx="66" cy="116" rx="10" ry="6" fill="#fb923c"/>
  </g>

  <text x="180" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" fill="#1c1917" letter-spacing="-2">sniff</text>
  <text x="180" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#ea580c" font-weight="600">AI-Powered QA Testing</text>
  <text x="180" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a8a29e">One command · Eight checks · Zero config</text>
</svg>
