<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-3px) rotate(-1deg); } 75% { transform: translateY(-3px) rotate(1deg); } 50% { transform: translateY(-6px) rotate(0deg); } }
    @keyframes blink { 0%,40%,44%,100% { ry: 9; } 42% { ry: 1; } }
    @keyframes sniffNose { 0%,100% { transform: translateY(0) scale(1); } 20% { transform: translateY(1px) scale(1.15); } 40% { transform: translateY(-1px) scale(0.9); } 60% { transform: translateY(1px) scale(1.1); } }
    @keyframes tailSwish { 0%,100% { transform: rotate(0deg); } 30% { transform: rotate(8deg); } 60% { transform: rotate(-5deg); } }
    @keyframes earTwitch { 0%,90%,100% { transform: rotate(0deg); } 93% { transform: rotate(-5deg); } 96% { transform: rotate(3deg); } }
    .cat { animation: bob 3s ease-in-out infinite; }
    .eye-l, .eye-r { animation: blink 5s ease-in-out infinite; }
    .eye-r { animation-delay: 0.15s; }
    .nose-g { animation: sniffNose 1.5s ease-in-out infinite; transform-origin: 50px 62px; }
    .tail { animation: tailSwish 2s ease-in-out infinite; transform-origin: 72px 82px; }
    .ear-r { animation: earTwitch 4s ease-in-out infinite; transform-origin: 68px 20px; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#fffbf5" stroke="#fb923c" stroke-width="1.2" stroke-opacity="0.15"/>

  <g class="cat" transform="translate(42, 32)">
    <!-- Tail -->
    <g class="tail">
      <path d="M 72 82 Q 105 55 100 30 Q 98 22 102 18" stroke="#f97316" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Tail stripes -->
      <path d="M 88 52 Q 92 48 96 50" stroke="#c2410c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 93 38 Q 97 34 100 37" stroke="#c2410c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Body -->
    <ellipse cx="50" cy="95" rx="30" ry="22" fill="#f97316"/>
    <!-- Belly -->
    <ellipse cx="50" cy="100" rx="18" ry="13" fill="#fed7aa"/>
    <!-- Body stripes -->
    <path d="M 28 85 Q 32 82 30 78" stroke="#c2410c" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 72 85 Q 68 82 70 78" stroke="#c2410c" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Head (big! pikachu proportions) -->
    <ellipse cx="50" cy="48" rx="40" ry="36" fill="#f97316"/>

    <!-- Face plate (lighter) -->
    <ellipse cx="50" cy="54" rx="28" ry="24" fill="#fdba74"/>

    <!-- Ears -->
    <g>
      <polygon points="14,30 22,0 38,24" fill="#f97316"/>
      <polygon points="18,27 24,6 34,24" fill="#fde68a"/>
    </g>
    <g class="ear-r">
      <polygon points="62,24 78,0 86,30" fill="#f97316"/>
      <polygon points="66,24 76,6 82,27" fill="#fde68a"/>
    </g>

    <!-- Forehead stripes (tiger!) -->
    <path d="M 38 28 L 42 20" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 48 26 L 50 17" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 58 28 L 56 20" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Eyes (huge, anime/pikachu style) -->
    <ellipse cx="36" cy="46" rx="11" ry="9" fill="white"/>
    <ellipse cx="64" cy="46" rx="11" ry="9" fill="white"/>
    <!-- Iris -->
    <ellipse class="eye-l" cx="38" cy="46" rx="7" ry="9" fill="#92400e"/>
    <ellipse class="eye-r" cx="66" cy="46" rx="7" ry="9" fill="#92400e"/>
    <!-- Pupil -->
    <ellipse cx="39" cy="45" rx="4" ry="5.5" fill="#1c1917"/>
    <ellipse cx="67" cy="45" rx="4" ry="5.5" fill="#1c1917"/>
    <!-- Eye shine (big, pikachu style) -->
    <circle cx="42" cy="42" r="3" fill="white"/>
    <circle cx="70" cy="42" r="3" fill="white"/>
    <circle cx="36" cy="48" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="64" cy="48" r="1.5" fill="white" opacity="0.6"/>

    <!-- Cheeks (pikachu blush!) -->
    <ellipse cx="20" cy="58" rx="8" ry="5" fill="#fca5a5" opacity="0.5"/>
    <ellipse cx="80" cy="58" rx="8" ry="5" fill="#fca5a5" opacity="0.5"/>

    <!-- Nose (sniffing!) -->
    <g class="nose-g">
      <ellipse cx="50" cy="60" rx="5" ry="4" fill="#be123c"/>
      <!-- Nostrils -->
      <circle cx="48" cy="60" r="1.2" fill="#881337"/>
      <circle cx="52" cy="60" r="1.2" fill="#881337"/>
    </g>

    <!-- Sniff lines (showing it's sniffing!) -->
    <path d="M 42 56 Q 38 52 35 54" stroke="#f9a8d4" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 58 56 Q 62 52 65 54" stroke="#f9a8d4" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Mouth (cute W shape) -->
    <path d="M 44 64 Q 47 68 50 65 Q 53 68 56 64" stroke="#92400e" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="6" y1="52" x2="30" y2="56" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>
    <line x1="4" y1="60" x2="29" y2="61" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="68" x2="30" y2="65" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="56" x2="94" y2="52" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>
    <line x1="71" y1="61" x2="96" y2="60" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="65" x2="92" y2="68" stroke="#c2410c" stroke-width="0.8" opacity="0.4"/>

    <!-- Paws -->
    <ellipse cx="30" cy="115" rx="12" ry="7" fill="#f97316"/>
    <ellipse cx="70" cy="115" rx="12" ry="7" fill="#f97316"/>
    <!-- Paw pads -->
    <circle cx="26" cy="115" r="2.5" fill="#fed7aa"/>
    <circle cx="32" cy="113" r="2.5" fill="#fed7aa"/>
    <circle cx="66" cy="115" r="2.5" fill="#fed7aa"/>
    <circle cx="72" cy="113" r="2.5" fill="#fed7aa"/>
  </g>

  <!-- Title -->
  <text x="180" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" fill="#1c1917" letter-spacing="-2">sniff</text>
  <!-- Subtitle -->
  <text x="180" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#ea580c" font-weight="600">AI-Powered QA Testing</text>
  <!-- Tagline -->
  <text x="180" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a8a29e">One command · Eight checks · Zero config</text>
</svg>
