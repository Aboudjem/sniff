<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes blink { 0%,42%,46%,100% { r: 2.5; } 44% { r: 0.3; } }
    @keyframes sniffNose { 0%,100% { rx: 4; ry: 3; } 30% { rx: 4.5; ry: 3.5; } 60% { rx: 3.8; ry: 2.8; } }
    .cat { animation: bob 2.5s ease-in-out infinite; }
    .eye-l { animation: blink 4s ease-in-out infinite; }
    .eye-r { animation: blink 4s ease-in-out infinite 0.1s; }
    .nose { animation: sniffNose 1.2s ease-in-out infinite; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#1a1020" stroke="#f87171" stroke-width="1.2" stroke-opacity="0.15"/>

  <!-- Cat mascot -->
  <g class="cat" transform="translate(50, 40)">
    <!-- Tail -->
    <path d="M 75 85 Q 98 65 92 48" stroke="#d1d5db" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="92" cy="47" r="4" fill="#d1d5db"/>

    <!-- Body -->
    <ellipse cx="50" cy="90" rx="28" ry="20" fill="#d1d5db"/>
    <ellipse cx="50" cy="94" rx="14" ry="10" fill="#e5e7eb"/>

    <!-- Head -->
    <ellipse cx="50" cy="52" rx="36" ry="32" fill="#d1d5db"/>

    <!-- Ears -->
    <polygon points="20,34 28,5 44,28" fill="#d1d5db"/>
    <polygon points="56,28 72,5 80,34" fill="#d1d5db"/>
    <polygon points="24,31 30,12 40,28" fill="#fb923c" opacity="0.7"/>
    <polygon points="60,28 70,12 76,31" fill="#fb923c" opacity="0.7"/>

    <!-- Eyes -->
    <ellipse cx="37" cy="48" rx="8" ry="7.5" fill="#fef3c7"/>
    <ellipse cx="63" cy="48" rx="8" ry="7.5" fill="#fef3c7"/>
    <circle cx="38" cy="47" r="4.5" fill="#f59e0b"/>
    <circle cx="64" cy="47" r="4.5" fill="#f59e0b"/>
    <circle class="eye-l" cx="39" cy="46.5" r="2.5" fill="#1f2937"/>
    <circle class="eye-r" cx="65" cy="46.5" r="2.5" fill="#1f2937"/>
    <circle cx="40.5" cy="45" r="1.2" fill="white" opacity="0.9"/>
    <circle cx="66.5" cy="45" r="1.2" fill="white" opacity="0.9"/>

    <!-- Nose -->
    <ellipse class="nose" cx="50" cy="58" rx="4" ry="3" fill="#fb7185"/>

    <!-- Mouth -->
    <path d="M 46 61 Q 50 65 54 61" stroke="#6b7280" stroke-width="1" fill="none"/>

    <!-- Whiskers -->
    <line x1="14" y1="53" x2="34" y2="56" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>
    <line x1="14" y1="60" x2="34" y2="60" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>
    <line x1="12" y1="67" x2="33" y2="63" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>
    <line x1="66" y1="56" x2="86" y2="53" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>
    <line x1="66" y1="60" x2="86" y2="60" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>
    <line x1="67" y1="63" x2="88" y2="67" stroke="#6b7280" stroke-width="0.8" opacity="0.6"/>

    <!-- Paws -->
    <ellipse cx="32" cy="108" rx="10" ry="6" fill="#d1d5db"/>
    <ellipse cx="68" cy="108" rx="10" ry="6" fill="#d1d5db"/>
  </g>

  <text x="180" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f9fafb" letter-spacing="-1.5">sniff</text>
  <text x="180" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#fb7185" font-weight="600">AI-Powered QA Testing</text>
  <text x="180" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">One command · Eight checks · Zero config</text>
</svg>
