<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes blink {
      0%, 45%, 50%, 92%, 95%, 100% { transform: scaleY(1); }
      47%, 93% { transform: scaleY(0.1); }
    }
    @keyframes nose-twitch {
      0%,100% { transform: translate(0,0) rotate(0); }
      50% { transform: translate(0,-0.4px) rotate(-2deg); }
    }
    @keyframes tail-sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(5deg); } }
    @keyframes breath { 0%,100% { transform: scale(1); } 50% { transform: scaleY(1.015); } }
    @keyframes arm-wiggle {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(1px); }
    }
    @keyframes heart-float {
      0% { opacity: 0; transform: translate(0,0) scale(0.5); }
      20% { opacity: 1; transform: translate(0,-3px) scale(1); }
      80% { opacity: 0.8; transform: translate(4px,-16px) scale(0.9); }
      100% { opacity: 0; transform: translate(6px,-24px) scale(0.5); }
    }
    @keyframes sniff-p {
      0% { opacity: 0; transform: translate(0,0) scale(0.3); }
      15% { opacity: 0.95; transform: translate(0,-4px) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx,0),-22px) scale(0.4); }
    }
    @keyframes sparkle {
      0%,65%,100% { opacity: 0; transform: scale(0.4); }
      75% { opacity: 1; transform: scale(1.2); }
    }

    .cat { animation: bob 3s ease-in-out infinite; }
    .body-shape { animation: breath 3.4s ease-in-out infinite; transform-origin: 100px 132px; transform-box: fill-box; }
    .eyes { animation: blink 5.2s ease-in-out infinite; transform-origin: 100px 76px; }
    .nose { animation: nose-twitch 1.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .tail { animation: tail-sway 2.4s ease-in-out infinite; transform-origin: 120px 144px; transform-box: fill-box; }
    .arm-l, .arm-r { animation: arm-wiggle 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .arm-r { animation-delay: 0.5s; }
    .heart { animation: heart-float 3.4s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .p1 { animation: sniff-p 2.2s ease-out infinite; --dx: -5px; transform-origin: center; transform-box: fill-box; }
    .p2 { animation: sniff-p 2.2s ease-out infinite 0.7s; --dx: 4px; transform-origin: center; transform-box: fill-box; }
    .p3 { animation: sniff-p 2.2s ease-out infinite 1.4s; --dx: -1px; transform-origin: center; transform-box: fill-box; }
    .spk-1 { animation: sparkle 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .spk-2 { animation: sparkle 3s ease-in-out infinite 1.5s; transform-origin: center; transform-box: fill-box; }
  </style>

  <defs>
    <radialGradient id="orange-d" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#ffdfb0"/>
      <stop offset="55%" stop-color="#ffb57a"/>
      <stop offset="100%" stop-color="#db8538"/>
    </radialGradient>
    <radialGradient id="cream-d" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="100%" stop-color="#ffe4c3"/>
    </radialGradient>
    <radialGradient id="ear-inner-d" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#ffc8d6"/>
      <stop offset="100%" stop-color="#ff7f9c"/>
    </radialGradient>
    <radialGradient id="nose-d" cx="40%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#ffc0d0"/>
      <stop offset="55%" stop-color="#ff6f8c"/>
      <stop offset="100%" stop-color="#b83050"/>
    </radialGradient>
    <linearGradient id="title-d" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ffe4bc"/>
      <stop offset="55%" stop-color="#ffb87a"/>
      <stop offset="100%" stop-color="#ff7f9c"/>
    </linearGradient>
  </defs>

  <rect x="10" y="20" width="700" height="160" rx="28" fill="#140e08" stroke="#ff8a4a" stroke-width="1" stroke-opacity="0.15"/>
  <ellipse cx="100" cy="120" rx="88" ry="70" fill="#ff8a4a" opacity="0.07"/>

  <g class="spk-1"><path d="M 22 48 L 24 52 L 28 54 L 24 56 L 22 60 L 20 56 L 16 54 L 20 52 Z" fill="#ffb87a" opacity="0.85"/></g>
  <g class="spk-2"><path d="M 196 62 L 198 66 L 202 67 L 198 68 L 196 72 L 194 68 L 190 67 L 194 66 Z" fill="#ff7f9c" opacity="0.85"/></g>

  <g class="cat">
    <!-- TAIL: drawn BEFORE body so body covers the base. Start deep inside body for clean attachment. -->
    <g class="tail">
      <path d="M 95 146
               C 140 144 176 122 180 94
               C 180 80 166 80 168 94
               Q 170 102 176 104"
            stroke="#db8538" stroke-width="12" fill="none" stroke-linecap="round"/>
      <!-- tail tip cream highlight -->
      <path d="M 174 102 Q 171 99 173 94"
            stroke="#ffd6a8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- BODY -->
    <g class="body-shape">
      <ellipse cx="100" cy="132" rx="40" ry="34" fill="url(#orange-d)"/>
      <!-- Cream chest that flows up into chin area -->
      <path d="M 100 102
               Q 78 108  78 130
               Q 80 156  100 156
               Q 120 156  122 130
               Q 122 108  100 102 Z"
            fill="url(#cream-d)"/>
    </g>

    <!-- BACK FEET (small, minimalist, subtle soft shadow instead of hard outline) -->
    <ellipse cx="80" cy="168" rx="10" ry="5" fill="url(#orange-d)" stroke="#b66a28" stroke-width="0.7" stroke-opacity="0.55"/>
    <ellipse cx="80" cy="169" rx="5" ry="2.5" fill="#ffecd0"/>
    <ellipse cx="120" cy="168" rx="10" ry="5" fill="url(#orange-d)" stroke="#b66a28" stroke-width="0.7" stroke-opacity="0.55"/>
    <ellipse cx="120" cy="169" rx="5" ry="2.5" fill="#ffecd0"/>

    <!-- FRONT HANDS (small kitten paws — no arm shaft, just little paw mitts peeking out) -->
    <g class="arm-l">
      <ellipse cx="82" cy="152" rx="7.5" ry="6" fill="url(#orange-d)" stroke="#b66a28" stroke-width="0.7" stroke-opacity="0.55"/>
      <ellipse cx="82" cy="153" rx="4.5" ry="3" fill="#ffecd0"/>
      <circle cx="82" cy="154" r="1" fill="#ff7f9c"/>
    </g>
    <g class="arm-r">
      <ellipse cx="118" cy="152" rx="7.5" ry="6" fill="url(#orange-d)" stroke="#b66a28" stroke-width="0.7" stroke-opacity="0.55"/>
      <ellipse cx="118" cy="153" rx="4.5" ry="3" fill="#ffecd0"/>
      <circle cx="118" cy="154" r="1" fill="#ff7f9c"/>
    </g>

    <!-- EARS (wide triangular, anchored at head corners) -->
    <g>
      <!-- Left ear: wide base, triangular -->
      <path d="M 66 60 L 58 22 L 92 48 Z" fill="url(#orange-d)" stroke-linejoin="round"/>
      <path d="M 72 56 L 68 32 L 88 48 Z" fill="url(#ear-inner-d)" stroke-linejoin="round"/>
    </g>
    <g>
      <!-- Right ear: mirrored -->
      <path d="M 134 60 L 142 22 L 108 48 Z" fill="url(#orange-d)" stroke-linejoin="round"/>
      <path d="M 128 56 L 132 32 L 112 48 Z" fill="url(#ear-inner-d)" stroke-linejoin="round"/>
    </g>

    <!-- CHEEK PUFFS (under head, visible as lower-face widening) -->
    <ellipse cx="76" cy="92" rx="14" ry="10" fill="url(#orange-d)"/>
    <ellipse cx="124" cy="92" rx="14" ry="10" fill="url(#orange-d)"/>

    <!-- HEAD (wider than tall — classic cat dome) -->
    <ellipse cx="100" cy="76" rx="44" ry="34" fill="url(#orange-d)"/>
    <!-- Soft crown highlight -->
    <ellipse cx="86" cy="56" rx="20" ry="6" fill="#fff3db" opacity="0.3"/>

    <!-- Subtle blush (on cheek puffs) -->
    <ellipse cx="70" cy="94" rx="7" ry="4" fill="#ff9ab0" opacity="0.5"/>
    <ellipse cx="130" cy="94" rx="7" ry="4" fill="#ff9ab0" opacity="0.5"/>

    <!-- Big shiny eyes (closer together, kitten spacing) -->
    <g class="eyes">
      <ellipse cx="89" cy="78" rx="6.5" ry="9" fill="#1a0f05"/>
      <ellipse cx="111" cy="78" rx="6.5" ry="9" fill="#1a0f05"/>
      <ellipse cx="91" cy="73" rx="2.5" ry="3.5" fill="#ffffff"/>
      <ellipse cx="113" cy="73" rx="2.5" ry="3.5" fill="#ffffff"/>
      <circle cx="87" cy="82" r="1.5" fill="#ffffff" opacity="0.8"/>
      <circle cx="109" cy="82" r="1.5" fill="#ffffff" opacity="0.8"/>
      <circle cx="92" cy="76" r="0.7" fill="#ffffff"/>
      <circle cx="114" cy="76" r="0.7" fill="#ffffff"/>
    </g>

    <!-- Soft cream muzzle pad (gives nose a home + classic two-bump kitty snoot) -->
    <ellipse cx="100" cy="96" rx="13" ry="7" fill="url(#cream-d)" opacity="0.9"/>

    <!-- Small classic pink cat nose -->
    <g class="nose">
      <path d="M 96 92
               L 104 92
               Q 107 94  105 97
               Q 102 100  100 100
               Q 98 100   95 97
               Q 93 94   96 92 Z"
            fill="url(#nose-d)"/>
      <ellipse cx="97.5" cy="93.5" rx="1.3" ry="0.9" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- Kawaii ω (UU) mouth: two happy bumps meeting under the nose -->
    <path d="M 92 100
             Q 96 105  100 101
             Q 104 105  108 100"
          stroke="#5a2a15" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tiny tongue peek under center -->
    <path d="M 97 104 Q 100 107 103 104 L 103 105 Q 100 108 97 105 Z"
          fill="#ff8fa3"/>
    <!-- Whisker dots on muzzle (anchor points, makes the whisker base believable) -->
    <circle cx="70" cy="95" r="0.9" fill="#7a4028"/>
    <circle cx="74" cy="98" r="0.9" fill="#7a4028"/>
    <circle cx="72" cy="101" r="0.9" fill="#7a4028"/>
    <circle cx="130" cy="95" r="0.9" fill="#7a4028"/>
    <circle cx="126" cy="98" r="0.9" fill="#7a4028"/>
    <circle cx="128" cy="101" r="0.9" fill="#7a4028"/>

    <!-- Whiskers: 3 per side, anchored on the face and extending OUT -->
    <line x1="70" y1="95" x2="48" y2="90" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="74" y1="98" x2="46" y2="98" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="72" y1="101" x2="48" y2="106" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="130" y1="95" x2="152" y2="90" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="126" y1="98" x2="154" y2="98" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
    <line x1="128" y1="101" x2="152" y2="106" stroke="#a07050" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>

    <!-- Floating heart -->
    <g class="heart">
      <path d="M 166 48
               C 163 45  158 47  158 51
               C 158 55  166 60  166 60
               C 166 60  174 55  174 51
               C 174 47  169 45  166 48 Z"
            fill="#ff7f9c" opacity="0.9"/>
    </g>

    <!-- Sniff particles -->
    <g class="p1"><circle cx="95" cy="86" r="1.4" fill="#ffb87a" opacity="0.9"/></g>
    <g class="p2"><circle cx="105" cy="86" r="1.2" fill="#ff7f9c" opacity="0.9"/></g>
    <g class="p3"><circle cx="100" cy="84" r="1" fill="#c43e5c" opacity="0.85"/></g>
  </g>

  <!-- Wordmark -->
  <text x="220" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="900" fill="url(#title-d)" letter-spacing="-2.5">sniff</text>
  <text x="220" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ff7f9c" font-weight="700">a tiny cat that sniffs out bugs before your users do</text>
  <text x="220" y="132" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#ffb87a">$ npx sniff-qa</text>
  <text x="220" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#a07858">one command · eight checks · zero config · zero api keys</text>
</svg>
