<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes blink {
      0%, 44%, 49%, 93%, 95%, 100% { transform: scaleY(1); }
      46%, 94% { transform: scaleY(0.08); }
    }
    @keyframes nose-wiggle {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(-0.4px,-0.3px) rotate(-3deg); }
      50% { transform: translate(0.4px,0) rotate(2deg); }
      75% { transform: translate(-0.2px,-0.4px) rotate(-1deg); }
    }
    @keyframes ear-l-flick { 0%,86%,100% { transform: rotate(0); } 90% { transform: rotate(-10deg); } 94% { transform: rotate(4deg); } }
    @keyframes ear-r-flick { 0%,82%,100% { transform: rotate(0); } 86% { transform: rotate(10deg); } 90% { transform: rotate(-4deg); } }
    @keyframes breath { 0%,100% { transform: scale(1); } 50% { transform: scale(1.018); } }
    @keyframes cheek-pulse { 0%,100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.08); opacity: 1; } }
    @keyframes tail-wag { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(22deg); } }
    @keyframes sniff-p {
      0% { opacity: 0; transform: translate(0,0) scale(0.3); }
      15% { opacity: 0.95; transform: translate(0,-4px) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx,0),-32px) scale(0.4); }
    }
    @keyframes sparkle {
      0%,65%,100% { opacity: 0; transform: scale(0.4); }
      75% { opacity: 1; transform: scale(1.2); }
      85% { opacity: 0.6; transform: scale(0.9); }
    }

    .kitty { animation: bob 2.8s ease-in-out infinite; }
    .body { animation: breath 3.4s ease-in-out infinite; transform-origin: 110px 115px; transform-box: fill-box; }
    .eyes { animation: blink 5.5s ease-in-out infinite; transform-origin: 110px 108px; }
    .nose { animation: nose-wiggle 1.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .ear-l { animation: ear-l-flick 5.5s ease-in-out infinite; transform-origin: 80px 66px; transform-box: fill-box; }
    .ear-r { animation: ear-r-flick 5.5s ease-in-out infinite 0.4s; transform-origin: 140px 66px; transform-box: fill-box; }
    .cheek-l { animation: cheek-pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .cheek-r { animation: cheek-pulse 3s ease-in-out infinite 0.5s; transform-origin: center; transform-box: fill-box; }
    .tail { animation: tail-wag 1s ease-in-out infinite; transform-origin: 172px 162px; transform-box: fill-box; }
    .p1 { animation: sniff-p 2.2s ease-out infinite; --dx: -7px; transform-origin: center; transform-box: fill-box; }
    .p2 { animation: sniff-p 2.2s ease-out infinite 0.55s; --dx: 6px; transform-origin: center; transform-box: fill-box; }
    .p3 { animation: sniff-p 2.2s ease-out infinite 1.1s; --dx: -2px; transform-origin: center; transform-box: fill-box; }
    .p4 { animation: sniff-p 2.2s ease-out infinite 1.65s; --dx: 8px; transform-origin: center; transform-box: fill-box; }
    .spk-1 { animation: sparkle 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .spk-2 { animation: sparkle 3s ease-in-out infinite 1s; transform-origin: center; transform-box: fill-box; }
    .spk-3 { animation: sparkle 3s ease-in-out infinite 2s; transform-origin: center; transform-box: fill-box; }
  </style>

  <defs>
    <radialGradient id="body-d" cx="40%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#ffe4bc"/>
      <stop offset="55%" stop-color="#ffc38a"/>
      <stop offset="100%" stop-color="#e8944a"/>
    </radialGradient>
    <radialGradient id="belly-d" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="100%" stop-color="#ffe8c8"/>
    </radialGradient>
    <radialGradient id="ear-inner-d" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffc0d0"/>
      <stop offset="100%" stop-color="#ff8aa5"/>
    </radialGradient>
    <radialGradient id="cheek-d" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ff9fb5"/>
      <stop offset="70%" stop-color="#ff5577"/>
      <stop offset="100%" stop-color="#d63d5c"/>
    </radialGradient>
    <radialGradient id="nose-d" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffc0d0"/>
      <stop offset="55%" stop-color="#ff6f8c"/>
      <stop offset="100%" stop-color="#b83050"/>
    </radialGradient>
    <linearGradient id="title-d" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ffe4bc"/>
      <stop offset="55%" stop-color="#ffb87a"/>
      <stop offset="100%" stop-color="#ff6f8c"/>
    </linearGradient>
  </defs>

  <rect x="10" y="20" width="700" height="160" rx="28" fill="#140e08" stroke="#ff8a4a" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Soft halo -->
  <ellipse cx="110" cy="108" rx="92" ry="82" fill="#ff8a4a" opacity="0.08"/>

  <!-- floating sparkles around kitty -->
  <g class="spk-1">
    <path d="M 30 50 L 32 56 L 38 58 L 32 60 L 30 66 L 28 60 L 22 58 L 28 56 Z" fill="#ffc38a" opacity="0.9"/>
  </g>
  <g class="spk-2">
    <path d="M 200 70 L 202 74 L 206 75 L 202 76 L 200 80 L 198 76 L 194 75 L 198 74 Z" fill="#ff8aa5" opacity="0.9"/>
  </g>
  <g class="spk-3">
    <path d="M 192 140 L 194 145 L 199 146 L 194 147 L 192 152 L 190 147 L 185 146 L 190 145 Z" fill="#ffe4bc" opacity="0.9"/>
  </g>

  <g class="kitty">
    <!-- Cat tail: soft S-curve up-right with a gentle hook -->
    <g class="tail">
      <path d="M 172 162
               Q 202 154  212 128
               Q 218 106  202 100
               Q 190 100  196 114"
            stroke="#e8944a" stroke-width="12" fill="none" stroke-linecap="round"/>
      <!-- tail tip highlight -->
      <path d="M 200 112 Q 196 108 198 104"
            stroke="#ffd6a8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Cat ears: wide base, soft pointy-rounded tips -->
    <g class="ear-l">
      <path d="M 64 66
               C 58 50  60 28  76 30
               C 90 36  96 54  98 64
               C 98 68  78 70  64 66 Z"
            fill="url(#body-d)"/>
      <path d="M 72 62
               C 70 52  74 40  80 42
               C 88 46  90 56  92 62
               C 90 64  80 64  72 62 Z"
            fill="url(#ear-inner-d)"/>
    </g>
    <g class="ear-r">
      <path d="M 156 66
               C 162 50  160 28  144 30
               C 130 36  124 54  122 64
               C 122 68  142 70  156 66 Z"
            fill="url(#body-d)"/>
      <path d="M 148 62
               C 150 52  146 40  140 42
               C 132 46  130 56  128 62
               C 130 64  140 64  148 62 Z"
            fill="url(#ear-inner-d)"/>
    </g>

    <!-- Main blob (head+body as one chonk) -->
    <g class="body">
      <ellipse cx="110" cy="115" rx="70" ry="62" fill="url(#body-d)"/>
      <!-- Top of head highlight -->
      <ellipse cx="92" cy="78" rx="30" ry="12" fill="#fff3db" opacity="0.35"/>
      <!-- Cream belly/muzzle -->
      <ellipse cx="110" cy="132" rx="48" ry="38" fill="url(#belly-d)"/>
    </g>

    <!-- Pikachu-style red cheeks (BIG and round) -->
    <g class="cheek-l">
      <circle cx="54" cy="126" r="12" fill="url(#cheek-d)"/>
      <circle cx="51" cy="123" r="4" fill="#ffc0d0" opacity="0.85"/>
    </g>
    <g class="cheek-r">
      <circle cx="166" cy="126" r="12" fill="url(#cheek-d)"/>
      <circle cx="163" cy="123" r="4" fill="#ffc0d0" opacity="0.85"/>
    </g>

    <!-- Shiny bead eyes -->
    <g class="eyes">
      <ellipse cx="82" cy="110" rx="7.5" ry="10" fill="#1a0f05"/>
      <ellipse cx="138" cy="110" rx="7.5" ry="10" fill="#1a0f05"/>
      <!-- Big shine -->
      <ellipse cx="85" cy="104" rx="3.2" ry="4" fill="#ffffff"/>
      <ellipse cx="141" cy="104" rx="3.2" ry="4" fill="#ffffff"/>
      <!-- Small shine -->
      <circle cx="79" cy="114" r="1.8" fill="#ffffff" opacity="0.8"/>
      <circle cx="135" cy="114" r="1.8" fill="#ffffff" opacity="0.8"/>
      <!-- Micro sparkle -->
      <circle cx="86" cy="107" r="0.9" fill="#ffffff"/>
      <circle cx="142" cy="107" r="0.9" fill="#ffffff"/>
    </g>

    <!-- Classic cat nose (rounded triangle, pink) -->
    <g class="nose">
      <!-- soft halo -->
      <ellipse cx="110" cy="128" rx="14" ry="10" fill="#ff6f8c" opacity="0.22"/>
      <!-- rounded triangle nose -->
      <path d="M 101 119
               Q 110 117  119 119
               Q 121 124  114 131
               Q 110 135  106 131
               Q 99 124  101 119 Z"
            fill="url(#nose-d)" stroke="#7a1f38" stroke-width="0.9" stroke-opacity="0.4"/>
      <!-- nose shine -->
      <ellipse cx="106" cy="122" rx="2.6" ry="1.8" fill="#ffffff" opacity="0.9"/>
      <ellipse cx="114" cy="122" rx="1" ry="0.7" fill="#ffffff" opacity="0.6"/>
      <!-- vertical philtrum line going down to mouth -->
      <line x1="110" y1="133" x2="110" y2="148" stroke="#6b3020" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Tiny ω mouth (kawaii cat mouth) -->
    <path d="M 101 151 Q 106 157 110 153 Q 114 157 119 151"
          stroke="#5a2a15" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tiny tongue peek -->
    <path d="M 107 154 Q 110 157 113 154 L 113 156 Q 110 158 107 156 Z"
          fill="#ff8fa3"/>

    <!-- Tiny paws peeking below -->
    <ellipse cx="86" cy="172" rx="14" ry="6" fill="#e8944a"/>
    <ellipse cx="86" cy="171" rx="7" ry="3" fill="#ffd6a8"/>
    <ellipse cx="134" cy="172" rx="14" ry="6" fill="#e8944a"/>
    <ellipse cx="134" cy="171" rx="7" ry="3" fill="#ffd6a8"/>

    <!-- Whiskers (subtle) -->
    <line x1="30" y1="124" x2="46" y2="126" stroke="#a07050" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="30" y1="132" x2="46" y2="132" stroke="#a07050" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="174" y1="124" x2="190" y2="126" stroke="#a07050" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="174" y1="132" x2="190" y2="132" stroke="#a07050" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>

    <!-- Sniff particles rising from nose -->
    <g class="p1"><circle cx="102" cy="114" r="1.8" fill="#ffc38a" opacity="0.9"/></g>
    <g class="p2"><circle cx="118" cy="114" r="1.4" fill="#ff8aa5" opacity="0.9"/></g>
    <g class="p3"><circle cx="110" cy="112" r="1.2" fill="#ff6f8c" opacity="0.85"/></g>
    <g class="p4"><circle cx="114" cy="116" r="1.5" fill="#ffd6a8" opacity="0.9"/></g>
  </g>

  <!-- Wordmark -->
  <text x="234" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="url(#title-d)" letter-spacing="-2.5">sniff</text>
  <text x="234" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ff8aa5" font-weight="700">a tiny cat that sniffs out bugs before your users do</text>
  <text x="234" y="134" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#ffc38a">$ npx sniff-qa</text>
  <text x="234" y="154" font-family="system-ui, sans-serif" font-size="11" fill="#a07858">one command · eight checks · zero config · zero api keys</text>
</svg>
